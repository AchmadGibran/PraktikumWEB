<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Link CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Script JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container mt-3">
        <h2>Button Styles Gibran</h2>
        
        <!-- Implementasi seluruh variasi kelas tombol bawaan Bootstrap dengan nama mahasiswa -->
        <button type="button" class="btn">Gibran Basic</button>
        <button type="button" class="btn btn-primary">Gibran Primary</button>
        <button type="button" class="btn btn-secondary">Gibran Secondary</button>
        <button type="button" class="btn btn-success">Gibran Success</button>
        <button type="button" class="btn btn-info">Gibran Info</button>
        <button type="button" class="btn btn-warning">Gibran Warning</button>
        <button type="button" class="btn btn-danger">Gibran Danger</button>
        <button type="button" class="btn btn-dark">Gibran Dark</button>
        <button type="button" class="btn btn-light">Gibran Light</button>
        <button type="button" class="btn btn-link">Gibran Link</button>
    </div>

</body>
</html>
