<!DOCTYPE html>
<html>
<head>
    <title>Latihan Selector CSS Gibran</title>
    <style>

        /* Mengatur latar belakang yang berbeda menggunakan class */
        .bg-hijau {
            background-color: lightgreen;
        }
        .bg-biru {
            background-color: lightskyblue;
        }
        
        /* Mengatur ukuran font menggunakan ID */
        #teks-besar {
            font-size: 28px;
        }
    </style>
</head>

<body>

    <p class="bg-hijau">Paragraf ini menggunakan class bg-hijau dengan latar belakang hijau muda.</p>
    <p class="bg-biru">Paragraf ini menggunakan class bg-biru dengan latar belakang biru muda.</p>
    
    <h1 id="teks-besar">Judul ini Menggunakan ID teks-besar</h1>

</body>

</html>
