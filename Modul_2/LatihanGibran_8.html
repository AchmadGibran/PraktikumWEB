<!DOCTYPE html>
<html>
<head>
    <title>Latihan Grid Layout CSS Gibran</title>
    <style>
        /* Membuat grid container dengan 3 kolom, 2 baris, dan gap 15px */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom sama rata */
            grid-template-rows: 100px 100px;        /* 2 baris masing-masing 100px */
            gap: 15px;                             /* Jarak antar item 15px */
            background-color: #f9f9f9;
            padding: 15px;
        }

        /* Gaya dasar untuk semua grid item */
        .grid-item {
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 100px; /* Membuat teks pas di tengah vertikal */
            font-size: 18px;
        }

        /* Memberikan warna latar belakang berbeda untuk tiap item */
        .item1 { background-color: #e74c3c; }
        .item2 { background-color: #3498db; }
        .item3 { background-color: #2ecc71; }
        .item4 { background-color: #f1c40f; }
        .item5 { background-color: #9b59b6; }
        .item6 { background-color: #34495e; }

        /* KUNCI: Mengatur item 1 agar menempati dua kolom sekaligus */
        .spesial {
            grid-column: span 2; 
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid-item item1 spesial">Item 1 Gibran(2 Kolom)</div>
        <div class="grid-item item2">Item 2 Gibran</div>
        <div class="grid-item item3">Item 3 Gibran</div>
        <div class="grid-item item4">Item 4 Gibran</div>
        <div class="grid-item item5">Item 5 Gibran</div>
        <div class="grid-item item6">Item 6 Gibran</div>
    </div>

</body>
</html>
