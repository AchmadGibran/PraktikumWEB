<!DOCTYPE html>
<html>
<head>
    <title>Latihan Flexbox CSS Gibran</title>
    <style>
        /* Membuat container flex dengan item tersebar merata dan sejajar di tengah */
        .flex-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f0f0f0;
            padding: 15px;
            height: 150px;
        }

        .flex-item {
            background-color: lightseagreen;
            color: white;
            padding: 25px;
            font-weight: bold;
            text-align: center;
            width: 80px;
        }
    </style>
</head>

<body>
    <div class="flex-container">
        <div class="flex-item">Item A</div>
        <div class="flex-item">Item B</div>
        <div class="flex-item">Item C</div>
    </div>
</body>

</html>
