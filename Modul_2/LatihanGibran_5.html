<!DOCTYPE html>
<html>
<head>
    <title>Latihan Font dan Text CSS</title>
    <style>
        /* Mengatur judul dengan font berbeda dan ukuran besar */
        h1 {
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 42px;
        }

        /* Mengatur paragraf rata kanan dan garis bawah */
        p {
            text-align: right;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Judul Gibran</h1>
    <p>Paragraf ini posisinya berada di rata kanan dan memiliki dekorasi garis bawah.</p>

</body>
</html>
